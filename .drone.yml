kind: pipeline
type: docker
name: default

# =========================================================
# DEFINISI VOLUME (Jembatan ke Server Asli)
# =========================================================
volumes:
  # 1. Agar Drone bisa memerintah Docker di Server
  - name: dockersock
    host:
      path: /var/run/docker.sock
  # 2. Agar Drone bisa masuk ke folder kodingan di Server
  - name: project_folder
    host:
      path: /root/smk3-monitoring

steps:
  - name: deploy
    image: docker:latest
    volumes:
      - name: dockersock
        path: /var/run/docker.sock
      - name: project_folder
        path: /root/smk3-monitoring
    commands:
      # Pindah file dari runner ke folder server asli agar persistent
      - mkdir -p /root/smk3-monitoring
      
      # BERSIHKAN file lama agar file yang dihapus di git juga hilang di server
      # Kita hapus folder code utama. JANGAN hapus 'public/uploads' atau .env secara membabi buta.
      - rm -rf /root/smk3-monitoring/app
      - rm -rf /root/smk3-monitoring/lib
      - rm -rf /root/smk3-monitoring/components
      - rm -rf /root/smk3-monitoring/prisma
      # Opsional: hapus public tapi hati-hati dengan uploads jika ada di situ (biasanya aman karena di-mount volume, tapi jaga-jaga)
      # - rm -rf /root/smk3-monitoring/public 

      - cp -rT . /root/smk3-monitoring
      - cd /root/smk3-monitoring
      
      # ⚠️ FIX PERMISSION: Buat folder upload dan buka aksesnya ⚠️
      - mkdir -p public/uploads
      - chmod -R 777 public/uploads

      # 4. Buat file .env (Pengganti Infisical)
      # Menggunakan 'host.docker.internal' agar jalan di Docker
      - echo "DATABASE_URL=postgresql://magang:6wx3pVKuM39AwAE2H1ObKeP8@host.docker.internal:5432/smk3_db?schema=public" > .env
      - echo "NEXTAUTH_URL=http://localhost:3000" >> .env
      - echo "NEXTAUTH_SECRET=rahasia-random-string-ganti-aja" >> .env

      # 5. Eksekusi Docker (Sesuai referensi Anda)
      - docker compose down
      - docker system prune -f  # Hapus cache/image gantung biar hemat storage
      - docker compose up -d --build

trigger:
  branch:
    - main
    